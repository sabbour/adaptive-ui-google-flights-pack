name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      # Using `npm install` instead of `npm ci` because @sabbour/adaptive-ui-core
      # (a peerDependency on GitHub Package Registry) cannot be pre-committed to the
      # lock file. `npm install` resolves and installs it at runtime using NODE_AUTH_TOKEN.
      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx tsc -b --noEmit
